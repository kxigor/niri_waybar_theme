# --- Восстановленные настройки из Debug ---
font_family             Fira Code
font_size               14.0
background_opacity      1.0
hide_window_decorations yes
cursor_shape            beam
enable_audio_bell       no
shell                   /bin/zsh
tab_bar_style           powerline
active_tab_font_style   bold
remember_window_size    no
initial_window_width    1000
initial_window_height   650
window_padding_width    6

# Цвета
cursor                  #ffffff
window_border_width     1
active_border_color     #1c6b73
inactive_border_color   #1c6b73

# --- Исправление для русской раскладки (Ctrl+Shift+V и др.) ---
# Копирование и вставка
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+с        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+shift+м        paste_from_clipboard

# Вкладки
map ctrl+shift+t        new_tab
map ctrl+shift+е        new_tab
map ctrl+shift+q        close_tab
map ctrl+shift+й        close_tab

# Окна
map ctrl+shift+enter    new_window
map ctrl+shift+т        new_window
map ctrl+shift+w        close_window
map ctrl+shift+ц        close_window

# Служебные
map ctrl+shift+f5       load_config_file
map ctrl+shift+а+5     load_config_file
